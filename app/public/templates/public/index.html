{% extends "base_template.html" %}

{% block title %}Akebulan Consulting{% endblock %}

{% block content %}
    <ul>
    {% for post in posts %}
        <li><a href="{{ url_for('public.show_post', slug=post.title_slug) }}">{{ post.title }}</a></li>

        <p>{{ post.summary }}</p>

        <a href="{{ url_for('public.show_post', slug=post.title_slug) }}">Read more</a> 
    {% endfor %}
    </ul>
{% endblock %}
